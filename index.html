<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Withdrawal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-5">
        <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center">
                <h4 class="mb-0">Payment Withdrawal</h4>
                <button class="btn btn-success">Kyc</button>
            </div>
            <hr>
            <div>
                <div class="d-flex justify-content-between">
                    <span>$24.7 / $350</span>
                </div>
                <div class="progress mt-2" style="height: 10px;">
                    <div class="progress-bar bg-info" role="progressbar" style="width: 7%;" aria-valuenow="7" aria-valuemin="0" aria-valuemax="100"></div>
                </div>
                 <div class="d-flex justify-content-start mt-1">
                    <small>7%</small>
                </div>
            </div>
            <div class="mt-4">
                <p class="mb-1">Total $ 24.7</p>
                <div class="input-group">
                    <input type="text" class="form-control" value="24.7">
                    <button class="btn btn-success">Withdraw</button>
                </div>
            </div>
        </div>

        <div class="card mt-4">
            <div class="card-body">
                 <h5 class="card-title">Payout Details</h5>
                 <div class="table-responsive">
                    <table class="table table-bordered">
                        <thead class="bg-success text-white">
                            <tr>
                                <th>Date</th>
                                <th>Message</th>
                                <th>Gross $</th>
                                <th>Invalid Activity $</th>
                                <th>Net Pay $</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>08-06-2024</td>
                                <td>No Payouts</td>
                                <td>$0</td>
                                <td>$0</td>
                                <td>$0</td>
                                <td><span class="badge bg-primary">No Payouts</span></td>
                            </tr>
                             <tr>
                                <td>08-05-2024</td>
                                <td>No Payouts</td>
                                <td>$0</td>
                                <td>$0</td>
                                <td>$0</td>
                                <td><span class="badge bg-primary">No Payouts</span></td>
                            </tr>
                             <tr>
                                <td>08-04-2024</td>
                                <td>No Payouts</td>
                                <td>$0</td>
                                <td>$0</td>
                                <td>$0</td>
                                <td><span class="badge bg-primary">No Payouts</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
